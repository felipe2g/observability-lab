services:

  log-processor:
    build:
      context: .
      dockerfile: log-processor/Dockerfile
    container_name: log-processor
    ports:
      - "8081:8081"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  log-ingestion:
    build:
      context: .
      dockerfile: log-ingestion/Dockerfile
    container_name: log-ingestion
    ports:
      - "8080:8080"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  ezkafka-visualizer:
    image: chandanbhagat/ezkafka-visualizer:latest
    container_name: ezkafka-visualizer
    ports:
      - "10080:3700"
    environment:
      PORT: 3700
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: ezkafka-visualizer
      KAFKA_CONNECTION_TIMEOUT: 3000
      KAFKA_REQUEST_TIMEOUT: 30000
    restart: unless-stopped